<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1c30"/>
      <stop offset="100%" stop-color="#0f2545"/>
    </linearGradient>
    <linearGradient id="vcardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#132a45"/>
      <stop offset="100%" stop-color="#0d1f38"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg4)"/>

  <!-- Progress dots -->
  <g transform="translate(500, 60)">
    <circle cx="0" cy="0" r="6" fill="#64748b"/>
    <circle cx="30" cy="0" r="6" fill="#64748b"/>
    <circle cx="60" cy="0" r="6" fill="#ff3e00"/>
    <circle cx="90" cy="0" r="6" fill="#ff3e00"/>
    <circle cx="120" cy="0" r="6" fill="#64748b"/>
  </g>

  <!-- Label -->
  <text x="540" y="120" font-family="'IBM Plex Sans', sans-serif" font-weight="600" font-size="15" fill="#ff3e00" text-anchor="middle" letter-spacing="3">BEHIND THE PRODUCT</text>

  <!-- Headline -->
  <text x="540" y="200" font-family="'Space Grotesk', 'Josefin Sans', sans-serif" font-weight="800" font-size="42" fill="#ffffff" text-anchor="middle" letter-spacing="-1">
    <tspan x="540" dy="0">What does seeID</tspan>
  </text>
  <text x="540" y="260" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="42" fill="#ff3e00" text-anchor="middle" letter-spacing="-1">
    <tspan x="540" dy="0">actually verify?</tspan>
  </text>

  <rect x="440" y="285" width="200" height="3" rx="1.5" fill="#ff3e00" opacity="0.4"/>

  <!-- Verification card mockup -->
  <g transform="translate(120, 390)">
    <rect x="0" y="0" width="840" height="620" rx="24" fill="url(#vcardBg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>

    <!-- Card header bar -->
    <rect x="0" y="0" width="840" height="4" rx="2" fill="#ff3e00" opacity="0.6"/>

    <!-- Card title -->
    <text x="40" y="55" font-family="'IBM Plex Sans', sans-serif" font-weight="600" font-size="13" fill="#64748b" letter-spacing="2">IDENTITY VERIFICATION RESULT</text>

    <!-- VERIFIED badge -->
    <g transform="translate(640, 24)">
      <rect x="0" y="0" width="160" height="40" rx="20" fill="#00ff88" opacity="0.15"/>
      <text x="80" y="27" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="16" fill="#00ff88" text-anchor="middle">✓ VERIFIED</text>
    </g>

    <!-- Divider -->
    <line x1="40" y1="80" x2="800" y2="80" stroke="#ffffff" stroke-opacity="0.06"/>

    <!-- Person info row -->
    <g transform="translate(40, 110)">
      <circle cx="35" cy="35" r="35" fill="#ff3e00" opacity="0.1"/>
      <text x="35" y="42" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="20" fill="#ff3e00" text-anchor="middle">TM</text>
      <text x="90" y="32" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="22" fill="#ffffff">T. Mokoena</text>
      <text x="90" y="58" font-family="'IBM Plex Mono', monospace" font-weight="500" font-size="16" fill="#64748b">ID · 90*******083</text>
    </g>

    <!-- Verification checks -->
    <g transform="translate(40, 200)">
      <!-- Check 1 -->
      <rect x="0" y="0" width="760" height="50" rx="8" fill="#ffffff" opacity="0.03"/>
      <text x="16" y="32" font-family="'IBM Plex Sans', sans-serif" font-size="15" fill="#94a3b8">DHA ID match (National Population Register)</text>
      <rect x="640" y="10" width="80" height="30" rx="6" fill="#00ff88" opacity="0.12"/>
      <text x="680" y="31" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="13" fill="#00ff88" text-anchor="middle">PASS</text>

      <!-- Check 2 -->
      <rect x="0" y="60" width="760" height="50" rx="8" fill="#ffffff" opacity="0.03"/>
      <text x="16" y="92" font-family="'IBM Plex Sans', sans-serif" font-size="15" fill="#94a3b8">Facial liveness (active + passive)</text>
      <rect x="640" y="70" width="80" height="30" rx="6" fill="#00ff88" opacity="0.12"/>
      <text x="680" y="91" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="13" fill="#00ff88" text-anchor="middle">99.2%</text>

      <!-- Check 3 -->
      <rect x="0" y="120" width="760" height="50" rx="8" fill="#ffffff" opacity="0.03"/>
      <text x="16" y="152" font-family="'IBM Plex Sans', sans-serif" font-size="15" fill="#94a3b8">Document authenticity (ID book / smart card)</text>
      <rect x="640" y="130" width="80" height="30" rx="6" fill="#00ff88" opacity="0.12"/>
      <text x="680" y="151" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="13" fill="#00ff88" text-anchor="middle">PASS</text>

      <!-- Check 4 -->
      <rect x="0" y="180" width="760" height="50" rx="8" fill="#ffffff" opacity="0.03"/>
      <text x="16" y="212" font-family="'IBM Plex Sans', sans-serif" font-size="15" fill="#94a3b8">PEP &amp; sanctions screening</text>
      <rect x="640" y="190" width="80" height="30" rx="6" fill="#00ff88" opacity="0.12"/>
      <text x="680" y="211" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="13" fill="#00ff88" text-anchor="middle">CLEAR</text>
    </g>

    <!-- Card footer -->
    <line x1="40" y1="460" x2="800" y2="460" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="40" y="495" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="16" fill="#00ff88">Completed in 2.4s</text>
    <text x="680" y="495" font-family="'IBM Plex Sans', sans-serif" font-weight="500" font-size="14" fill="#64748b" text-anchor="end">seeID · DHA &amp; NPR</text>
    <rect x="680" y="475" width="120" height="2" rx="1" fill="#ff3e00" opacity="0.3"/>
  </g>

  <!-- CTA -->
  <text x="540" y="1100" font-family="'IBM Plex Sans', sans-serif" font-weight="600" font-size="18" fill="#64748b" text-anchor="middle">One platform, all checks — next: full list →</text>

  <text x="540" y="1880" font-family="'IBM Plex Sans', sans-serif" font-weight="500" font-size="14" fill="#64748b" text-anchor="middle">seeID · Verify South African identities in seconds</text>
</svg>