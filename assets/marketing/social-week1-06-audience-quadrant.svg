<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bgQ" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1c30"/>
      <stop offset="100%" stop-color="#0a1830"/>
    </linearGradient>
    <linearGradient id="q1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3e00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff3e00" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="q2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="q3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="q4" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff3e00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff3e00" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgQ)"/>

  <!-- Thin crosshair lines dividing quadrants -->
  <line x1="0" y1="540" x2="1080" y2="540" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="540" y1="0" x2="540" y2="1080" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Quadrant 1: Banks & Fintech (top-left) -->
  <rect x="0" y="0" width="540" height="540" fill="url(#q1)"/>
  <g transform="translate(40, 40)">
    <!-- Icon -->
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#ff3e00" opacity="0.15"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="28" fill="#ff3e00" text-anchor="middle">🏦</text>
    <!-- Label -->
    <text x="0" y="100" font-family="'Space Grotesk', 'Josefin Sans', sans-serif" font-weight="800" font-size="26" fill="#ffffff" letter-spacing="-0.5">Banks &amp; Fintech</text>
    <text x="0" y="140" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="500" font-size="16" fill="#94a3b8">
      <tspan x="0" dy="0">FICA onboarding in seconds.</tspan>
    </text>
    <text x="0" y="175" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="400" font-size="14" fill="#64748b">
      <tspan x="0" dy="0">DHA matching, liveness, sanctions —</tspan>
      <tspan x="0" dy="24">one flow, audit-ready.</tspan>
    </text>
    <!-- Bottom accent -->
    <rect x="0" y="200" width="60" height="3" rx="1.5" fill="#ff3e00" opacity="0.6"/>
  </g>

  <!-- Quadrant 2: HR & Recruiters (top-right) -->
  <rect x="540" y="0" width="540" height="540" fill="url(#q2)"/>
  <g transform="translate(580, 40)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#00ff88" opacity="0.1"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="28" fill="#00ff88" text-anchor="middle">👥</text>
    <text x="0" y="100" font-family="'Space Grotesk', 'Josefin Sans', sans-serif" font-weight="800" font-size="26" fill="#ffffff" letter-spacing="-0.5">HR &amp; Recruiters</text>
    <text x="0" y="140" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="500" font-size="16" fill="#94a3b8">
      <tspan x="0" dy="0">Standardised background screening.</tspan>
    </text>
    <text x="0" y="175" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="400" font-size="14" fill="#64748b">
      <tspan x="0" dy="0">Criminal, credit, ID verification —</tspan>
      <tspan x="0" dy="24">consistent results every time.</tspan>
    </text>
    <rect x="0" y="200" width="60" height="3" rx="1.5" fill="#00ff88" opacity="0.6"/>
  </g>

  <!-- Quadrant 3: Government (bottom-left) -->
  <rect x="0" y="540" width="540" height="540" fill="url(#q3)"/>
  <g transform="translate(40, 580)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#00ff88" opacity="0.1"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="28" fill="#00ff88" text-anchor="middle">🏛</text>
    <text x="0" y="100" font-family="'Space Grotesk', 'Josefin Sans', sans-serif" font-weight="800" font-size="26" fill="#ffffff" letter-spacing="-0.5">Government</text>
    <text x="0" y="140" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="500" font-size="16" fill="#94a3b8">
      <tspan x="0" dy="0">Authoritative citizen verification.</tspan>
    </text>
    <text x="0" y="175" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="400" font-size="14" fill="#64748b">
      <tspan x="0" dy="0">DHA direct access, POPIA-compliant —</tspan>
      <tspan x="0" dy="24">built for public-sector scale.</tspan>
    </text>
    <rect x="0" y="200" width="60" height="3" rx="1.5" fill="#00ff88" opacity="0.6"/>
  </g>

  <!-- Quadrant 4: Developers (bottom-right) -->
  <rect x="540" y="540" width="540" height="540" fill="url(#q4)"/>
  <g transform="translate(580, 580)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#ff3e00" opacity="0.15"/>
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="28" fill="#ff3e00" text-anchor="middle">⚡</text>
    <text x="0" y="100" font-family="'Space Grotesk', 'Josefin Sans', sans-serif" font-weight="800" font-size="26" fill="#ffffff" letter-spacing="-0.5">Developers</text>
    <text x="0" y="140" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="500" font-size="16" fill="#94a3b8">
      <tspan x="0" dy="0">Embed via one REST API.</tspan>
    </text>
    <text x="0" y="175" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="400" font-size="14" fill="#64748b">
      <tspan x="0" dy="0">Clean JSON responses, webhooks,</tspan>
      <tspan x="0" dy="24">SDKs — production in an afternoon.</tspan>
    </text>
    <rect x="0" y="200" width="60" height="3" rx="1.5" fill="#ff3e00" opacity="0.6"/>
  </g>

  <!-- Center logo mark -->
  <g transform="translate(510, 508)">
    <rect x="0" y="0" width="60" height="60" rx="30" fill="#0b1c30" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
    <g transform="translate(10, 7)" opacity="0.9">
      <svg width="40" height="48" viewBox="0 0 107 128">
        <path d="M94.157 22.819c-10.4-14.885-30.94-19.297-45.792-9.835L22.282 29.608A29.92 29.92 0 0 0 8.764 49.65a31.5 31.5 0 0 0 3.108 20.231 30 30 0 0 0-4.477 11.183 31.9 31.9 0 0 0 5.448 24.116c10.402 14.887 30.942 19.297 45.791 9.835l26.083-16.624A29.92 29.92 0 0 0 98.235 78.35a31.53 31.53 0 0 0-3.105-20.232 30 30 0 0 0 4.474-11.182 31.88 31.88 0 0 0-5.447-24.116" fill="#ff3e00"/>
        <path d="M45.817 106.582a20.72 20.72 0 0 1-22.237-8.243 19.17 19.17 0 0 1-3.277-14.503 18 18 0 0 1 .624-2.435l.49-1.498 1.337.981a33.6 33.6 0 0 0 10.203 5.098l.97.294-.09.968a5.85 5.85 0 0 0 1.052 3.878 6.24 6.24 0 0 0 6.695 2.485 5.8 5.8 0 0 0 1.603-.704L69.27 76.28a5.43 5.43 0 0 0 2.45-3.631 5.8 5.8 0 0 0-.987-4.371 6.24 6.24 0 0 0-6.698-2.487 5.7 5.7 0 0 0-1.6.704l-9.953 6.345a19 19 0 0 1-5.296 2.326 20.72 20.72 0 0 1-22.237-8.243 19.17 19.17 0 0 1-3.277-14.502 17.99 17.99 0 0 1 8.13-12.052l26.081-16.623a19 19 0 0 1 5.3-2.329 20.72 20.72 0 0 1 22.237 8.243 19.17 19.17 0 0 1 3.277 14.503 18 18 0 0 1-.624 2.435l-.49 1.498-1.337-.98a33.6 33.6 0 0 0-10.203-5.1l-.97-.294.09-.968a5.86 5.86 0 0 0-1.052-3.878 6.24 6.24 0 0 0-6.696-2.485 5.8 5.8 0 0 0-1.602.704L37.73 51.72a5.42 5.42 0 0 0-2.449 3.63 5.79 5.79 0 0 0 .986 4.372 6.24 6.24 0 0 0 6.698 2.486 5.8 5.8 0 0 0 1.602-.704l9.952-6.342a19 19 0 0 1 5.295-2.328 20.72 20.72 0 0 1 22.237 8.242 19.17 19.17 0 0 1 3.277 14.503 18 18 0 0 1-8.13 12.053l-26.081 16.622a19 19 0 0 1-5.3 2.328" fill="#ffffff"/>
      </svg>
    </g>
  </g>

  <!-- Top header bar -->
  <rect x="0" y="0" width="1080" height="4" fill="#ff3e00" opacity="0.8"/>

  <!-- Brand text bottom -->
  <text x="540" y="1056" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="500" font-size="12" fill="#64748b" text-anchor="middle">seeID — Verify South African identities in seconds · seeid.co.za</text>
</svg>