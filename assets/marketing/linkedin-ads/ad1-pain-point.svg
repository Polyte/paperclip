<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1c30"/>
      <stop offset="40%" stop-color="#0e2340"/>
      <stop offset="100%" stop-color="#081828"/>
    </linearGradient>
    <!-- Orange glow -->
    <radialGradient id="glowL" cx="0.15" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ff3e00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff3e00" stop-opacity="0"/>
    </radialGradient>
    <!-- Green glow -->
    <radialGradient id="glowR" cx="0.85" cy="0.75" r="0.45">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <!-- Orange button gradient -->
    <linearGradient id="btnOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d1a"/>
      <stop offset="100%" stop-color="#e62e00"/>
    </linearGradient>
    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3e00"/>
      <stop offset="100%" stop-color="#ff3e00" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle grid -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect width="1200" height="627" fill="url(#grid)"/>
  <rect width="1200" height="627" fill="url(#glowL)"/>
  <rect width="1200" height="627" fill="url(#glowR)"/>

  <!-- Left vertical accent bar -->
  <rect x="0" y="0" width="4" height="300" fill="url(#accentLine)" opacity="0.6"/>

  <!-- Logo area -->
  <g transform="translate(64, 48)">
    <!-- Logo mark -->
    <svg width="42" height="50" viewBox="0 0 107 128">
      <path d="M94.157 22.819c-10.4-14.885-30.94-19.297-45.792-9.835L22.282 29.608A29.92 29.92 0 0 0 8.764 49.65a31.5 31.5 0 0 0 3.108 20.231 30 30 0 0 0-4.477 11.183 31.9 31.9 0 0 0 5.448 24.116c10.402 14.887 30.942 19.297 45.791 9.835l26.083-16.624A29.92 29.92 0 0 0 98.235 78.35a31.53 31.53 0 0 0-3.105-20.232 30 30 0 0 0 4.474-11.182 31.88 31.88 0 0 0-5.447-24.116" fill="#ff3e00"/>
      <path d="M45.817 106.582a20.72 20.72 0 0 1-22.237-8.243 19.17 19.17 0 0 1-3.277-14.503 18 18 0 0 1 .624-2.435l.49-1.498 1.337.981a33.6 33.6 0 0 0 10.203 5.098l.97.294-.09.968a5.85 5.85 0 0 0 1.052 3.878 6.24 6.24 0 0 0 6.695 2.485 5.8 5.8 0 0 0 1.603-.704L69.27 76.28a5.43 5.43 0 0 0 2.45-3.631 5.8 5.8 0 0 0-.987-4.371 6.24 6.24 0 0 0-6.698-2.487 5.7 5.7 0 0 0-1.6.704l-9.953 6.345a19 19 0 0 1-5.296 2.326 20.72 20.72 0 0 1-22.237-8.243 19.17 19.17 0 0 1-3.277-14.502 17.99 17.99 0 0 1 8.13-12.052l26.081-16.623a19 19 0 0 1 5.3-2.329 20.72 20.72 0 0 1 22.237 8.243 19.17 19.17 0 0 1 3.277 14.503 18 18 0 0 1-.624 2.435l-.49 1.498-1.337-.98a33.6 33.6 0 0 0-10.203-5.1l-.97-.294.09-.968a5.86 5.86 0 0 0-1.052-3.878 6.24 6.24 0 0 0-6.696-2.485 5.8 5.8 0 0 0-1.602.704L37.73 51.72a5.42 5.42 0 0 0-2.449 3.63 5.79 5.79 0 0 0 .986 4.372 6.24 6.24 0 0 0 6.698 2.486 5.8 5.8 0 0 0 1.602-.704l9.952-6.342a19 19 0 0 1 5.295-2.328 20.72 20.72 0 0 1 22.237 8.242 19.17 19.17 0 0 1 3.277 14.503 18 18 0 0 1-8.13 12.053l-26.081 16.622a19 19 0 0 1-5.3 2.328" fill="#ffffff"/>
    </svg>
    <!-- Wordmark -->
    <text x="52" y="42" font-family="'Space Grotesk', 'Josefin Sans', system-ui, sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="-0.5">see<text fill="#ff3e00">ID</text></text>
  </g>

  <!-- Large "₿" cost icon (right side) -->
  <g transform="translate(880, 140)" opacity="0.12">
    <circle cx="140" cy="140" r="120" fill="none" stroke="#ff3e00" stroke-width="2"/>
    <circle cx="140" cy="140" r="80" fill="none" stroke="#ff3e00" stroke-width="1" stroke-dasharray="4,8"/>
    <text x="140" y="160" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="80" fill="#ff3e00" text-anchor="middle">R</text>
  </g>

  <!-- Red "warning" accent block (top right) -->
  <rect x="1020" y="0" width="180" height="4" fill="#ff3e00" opacity="0.8"/>

  <!-- Main headline area -->
  <g font-family="'Space Grotesk', 'Josefin Sans', system-ui, sans-serif">
    <!-- Eyebrow -->
    <text x="80" y="195" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="600" font-size="13" fill="#ff3e00" letter-spacing="2" text-transform="uppercase">KYC &amp; FICA COMPLIANCE</text>

    <!-- Primary headline -->
    <text x="80" y="255" font-weight="800" font-size="54" fill="#ffffff" letter-spacing="-1.5">
      <tspan>Building KYC</tspan>
    </text>
    <text x="80" y="315" font-weight="800" font-size="54" fill="#ffffff" letter-spacing="-1.5">
      <tspan>in-house?</tspan>
    </text>

    <!-- Accent underline -->
    <rect x="80" y="330" width="320" height="4" rx="2" fill="#ff3e00"/>

    <!-- Subheadline -->
    <text x="80" y="385" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-size="20" fill="#94a3b8" letter-spacing="0">
      <tspan>Here's what it </tspan>
      <tspan font-weight="700" fill="#00ff88">actually costs</tspan>
      <tspan> — in time, compliance risk,</tspan>
    </text>
    <text x="80" y="415" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-size="20" fill="#94a3b8" letter-spacing="0">
      <tspan>and engineering hours.</tspan>
    </text>
  </g>

  <!-- Cost comparison cards -->
  <g transform="translate(80, 462)">
    <!-- Card 1: Build -->
    <rect x="0" y="0" width="280" height="80" rx="10" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <text x="140" y="28" font-family="'IBM Plex Sans', sans-serif" font-weight="600" font-size="12" fill="#64748b" text-anchor="middle">BUILD IN-HOUSE</text>
    <text x="140" y="58" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="28" fill="#ff3e00" text-anchor="middle">R500k+</text>

    <!-- Divider arrow -->
    <text x="295" y="52" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="24" fill="#00ff88" text-anchor="middle">→</text>

    <!-- Card 2: seeID -->
    <rect x="320" y="0" width="280" height="80" rx="10" fill="url(#cardGrad)" stroke="#00ff88" stroke-opacity="0.2" stroke-width="1.5"/>
    <rect x="320" y="70" width="280" height="10" rx="5" fill="#00ff88" opacity="0.15"/>
    <text x="460" y="28" font-family="'IBM Plex Sans', sans-serif" font-weight="600" font-size="12" fill="#64748b" text-anchor="middle">WITH seeID</text>
    <text x="460" y="58" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="28" fill="#00ff88" text-anchor="middle">R112/mo</text>

    <!-- Benefit bullets below cards -->
    <g transform="translate(0, 95)">
      <circle cx="6" cy="-4" r="4" fill="#00ff88" opacity="0.4"/>
      <text x="16" y="0" font-family="'IBM Plex Sans', sans-serif" font-size="13" fill="#64748b">No 6-month engineering project</text>
      <circle cx="280" cy="-4" r="4" fill="#00ff88" opacity="0.4"/>
      <text x="290" y="0" font-family="'IBM Plex Sans', sans-serif" font-size="13" fill="#64748b">No compliance audit headaches</text>
    </g>
  </g>

  <!-- CTA Button -->
  <g transform="translate(740, 470)">
    <rect x="0" y="0" width="220" height="52" rx="8" fill="url(#btnOrange)"/>
    <rect x="0" y="0" width="220" height="52" rx="8" fill="#fff" opacity="0.1"/>
    <text x="110" y="33" font-family="'Space Grotesk', 'Josefin Sans', sans-serif" font-weight="700" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Get the FICA guide →</text>
  </g>

  <!-- Trust badge row (bottom right) -->
  <g transform="translate(740, 545)">
    <rect x="0" y="0" width="420" height="36" rx="6" fill="#ffffff" opacity="0.04"/>
    <text x="70" y="23" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">DHA-powered</text>
    <line x1="140" y1="8" x2="140" y2="28" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="210" y="23" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">POPIA compliant</text>
    <line x1="280" y1="8" x2="280" y2="28" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="350" y="23" font-family="'IBM Plex Sans', sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Bank-grade security</text>
  </g>

  <!-- Decorative dots cluster (bottom left) -->
  <g opacity="0.06">
    <circle cx="60" cy="590" r="2" fill="#ff3e00"/>
    <circle cx="76" cy="585" r="2" fill="#ff3e00"/>
    <circle cx="92" cy="590" r="2" fill="#ff3e00"/>
    <circle cx="68" cy="600" r="2" fill="#00ff88"/>
    <circle cx="84" cy="600" r="2" fill="#00ff88"/>
  </g>
</svg>