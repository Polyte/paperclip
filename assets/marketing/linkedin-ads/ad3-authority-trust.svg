<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1c30"/>
      <stop offset="50%" stop-color="#0f2545"/>
      <stop offset="100%" stop-color="#0b1c30"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#ff3e00" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0b1c30" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
    <linearGradient id="btnOrange3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d1a"/>
      <stop offset="100%" stop-color="#e62e00"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <pattern id="hexGrid" width="80" height="46" patternUnits="userSpaceOnUse">
      <path d="M40 0 L80 23 L80 69 L40 92 L0 69 L0 23 Z" fill="none" stroke="#ffffff" stroke-opacity="0.015" stroke-width="1"/>
      <path d="M40 92 L80 115 L80 161 L40 184 L0 161 L0 115 Z" fill="none" stroke="#ffffff" stroke-opacity="0.015" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg3)"/>
  <rect width="1200" height="627" fill="url(#hexGrid)"/>
  <rect width="1200" height="627" fill="url(#centerGlow)"/>

  <!-- Logo area -->
  <g transform="translate(64, 48)">
    <svg width="42" height="50" viewBox="0 0 107 128">
      <path d="M94.157 22.819c-10.4-14.885-30.94-19.297-45.792-9.835L22.282 29.608A29.92 29.92 0 0 0 8.764 49.65a31.5 31.5 0 0 0 3.108 20.231 30 30 0 0 0-4.477 11.183 31.9 31.9 0 0 0 5.448 24.116c10.402 14.887 30.942 19.297 45.791 9.835l26.083-16.624A29.92 29.92 0 0 0 98.235 78.35a31.53 31.53 0 0 0-3.105-20.232 30 30 0 0 0 4.474-11.182 31.88 31.88 0 0 0-5.447-24.116" fill="#ff3e00"/>
      <path d="M45.817 106.582a20.72 20.72 0 0 1-22.237-8.243 19.17 19.17 0 0 1-3.277-14.503 18 18 0 0 1 .624-2.435l.49-1.498 1.337.981a33.6 33.6 0 0 0 10.203 5.098l.97.294-.09.968a5.85 5.85 0 0 0 1.052 3.878 6.24 6.24 0 0 0 6.695 2.485 5.8 5.8 0 0 0 1.603-.704L69.27 76.28a5.43 5.43 0 0 0 2.45-3.631 5.8 5.8 0 0 0-.987-4.371 6.24 6.24 0 0 0-6.698-2.487 5.7 5.7 0 0 0-1.6.704l-9.953 6.345a19 19 0 0 1-5.296 2.326 20.72 20.72 0 0 1-22.237-8.243 19.17 19.17 0 0 1-3.277-14.502 17.99 17.99 0 0 1 8.13-12.052l26.081-16.623a19 19 0 0 1 5.3-2.329 20.72 20.72 0 0 1 22.237 8.243 19.17 19.17 0 0 1 3.277 14.503 18 18 0 0 1-.624 2.435l-.49 1.498-1.337-.98a33.6 33.6 0 0 0-10.203-5.1l-.97-.294.09-.968a5.86 5.86 0 0 0-1.052-3.878 6.24 6.24 0 0 0-6.696-2.485 5.8 5.8 0 0 0-1.602.704L37.73 51.72a5.42 5.42 0 0 0-2.449 3.63 5.79 5.79 0 0 0 .986 4.372 6.24 6.24 0 0 0 6.698 2.486 5.8 5.8 0 0 0 1.602-.704l9.952-6.342a19 19 0 0 1 5.295-2.328 20.72 20.72 0 0 1 22.237 8.242 19.17 19.17 0 0 1 3.277 14.503 18 18 0 0 1-8.13 12.053l-26.081 16.622a19 19 0 0 1-5.3 2.328" fill="#ffffff"/>
    </svg>
    <text x="52" y="42" font-family="'Space Grotesk', 'Josefin Sans', system-ui, sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="-0.5">see<text fill="#ff3e00">ID</text></text>
  </g>

  <!-- Center shield icon -->
  <g transform="translate(560, 80)">
    <!-- Outer ring glow -->
    <circle cx="40" cy="30" r="75" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.08"/>
    <circle cx="40" cy="30" r="70" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.05" stroke-dasharray="3,6"/>

    <!-- Shield shape with subtle fill -->
    <path d="M40 0 L80 0 L80 45 Q80 90 40 105 Q0 90 0 45 L0 0 Z" fill="url(#shieldGrad)" opacity="0.12"/>
    <path d="M40 6 L74 6 L74 45 Q74 84 40 96 Q6 84 6 45 L6 6 Z" fill="none" stroke="#00ff88" stroke-width="2.5" opacity="0.35"/>

    <!-- Checkmark -->
    <path d="M25 48 L37 62 L55 38" fill="none" stroke="#00ff88" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Centered content -->
  <g text-anchor="middle" font-family="'Space Grotesk', 'Josefin Sans', system-ui, sans-serif">
    <!-- Eyebrow -->
    <text x="600" y="255" font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="600" font-size="13" fill="#00ff88" letter-spacing="2">TRUST &amp; COMPLIANCE</text>

    <!-- Headline -->
    <text font-weight="800" font-size="46" fill="#ffffff" letter-spacing="-1">
      <tspan x="600" y="305">POPIA-compliant,</tspan>
    </text>
    <text font-weight="800" font-size="46" fill="#00ff88" letter-spacing="-1">
      <tspan x="600" y="360">DHA-powered</tspan>
    </text>
    <text font-weight="800" font-size="46" fill="#ffffff" letter-spacing="-1">
      <tspan x="600" y="415">identity verification.</tspan>
    </text>

    <!-- Trust line -->
    <text font-family="'IBM Plex Sans', 'Helvetica Neue', sans-serif" font-weight="500" font-size="17" fill="#94a3b8" font-style="italic">
      <tspan x="600" y="455">"Trusted by banks, fintechs, and government"</tspan>
    </text>
  </g>

  <!-- Compliance badges row -->
  <g transform="translate(140, 485)">
    <!-- Badge 1: POPIA -->
    <rect x="0" y="0" width="210" height="64" rx="12" fill="url(#badgeGrad)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="0" y="0" width="210" height="3" rx="1.5" fill="#00ff88" opacity="0.5"/>
    <text x="105" y="28" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="15" fill="#ffffff" text-anchor="middle">POPIA</text>
    <text x="105" y="48" font-family="'IBM Plex Sans', sans-serif" font-weight="500" font-size="11" fill="#64748b" text-anchor="middle">Data privacy compliant</text>

    <!-- Badge 2: FICA -->
    <rect x="230" y="0" width="210" height="64" rx="12" fill="url(#badgeGrad)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="230" y="0" width="210" height="3" rx="1.5" fill="#00ff88" opacity="0.5"/>
    <text x="335" y="28" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="15" fill="#ffffff" text-anchor="middle">FICA</text>
    <text x="335" y="48" font-family="'IBM Plex Sans', sans-serif" font-weight="500" font-size="11" fill="#64748b" text-anchor="middle">KYC requirements met</text>

    <!-- Badge 3: DHA -->
    <rect x="460" y="0" width="210" height="64" rx="12" fill="url(#badgeGrad)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="460" y="0" width="210" height="3" rx="1.5" fill="#00ff88" opacity="0.5"/>
    <text x="565" y="28" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="15" fill="#ffffff" text-anchor="middle">DHA</text>
    <text x="565" y="48" font-family="'IBM Plex Sans', sans-serif" font-weight="500" font-size="11" fill="#64748b" text-anchor="middle">National Population Register</text>

    <!-- Badge 4: Bank-grade -->
    <rect x="690" y="0" width="210" height="64" rx="12" fill="url(#badgeGrad)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <rect x="690" y="0" width="210" height="3" rx="1.5" fill="#00ff88" opacity="0.5"/>
    <text x="795" y="28" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="15" fill="#ffffff" text-anchor="middle">BANK-GRADE</text>
    <text x="795" y="48" font-family="'IBM Plex Sans', sans-serif" font-weight="500" font-size="11" fill="#64748b" text-anchor="middle">Encryption &amp; security</text>
  </g>

  <!-- CTA Button -->
  <g transform="translate(460, 567)">
    <rect x="0" y="0" width="280" height="50" rx="8" fill="url(#btnOrange3)"/>
    <text x="140" y="32" font-family="'Space Grotesk', 'Josefin Sans', sans-serif" font-weight="700" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">See the product →</text>
  </g>
</svg>